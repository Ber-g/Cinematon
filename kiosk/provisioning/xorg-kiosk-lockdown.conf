# Kioskoscope — verrouillage X du kiosque (CIN-072).
# Installé en /etc/X11/xorg.conf.d/10-kiosk-lockdown.conf.
#
# Sans ça, un visiteur peut s'échapper de Chromium vers un shell OS :
#   - Ctrl+Alt+F2..F6 → bascule vers un TTY de login  → DontVTSwitch le bloque.
#   - Ctrl+Alt+Retour arrière → tue le serveur X       → DontZap le bloque.
# On désactive aussi la mise en veille/blanking : une borne doit rester allumée.
Section "ServerFlags"
    Option "DontVTSwitch"  "on"
    Option "DontZap"       "on"
    Option "BlankTime"     "0"
    Option "StandbyTime"   "0"
    Option "SuspendTime"   "0"
    Option "OffTime"       "0"
EndSection
