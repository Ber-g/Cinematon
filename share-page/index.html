<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Votre séance Kioskoscope</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0e0f13; color: #f2f3f5; padding: 24px 18px 48px; }
    main { max-width: 560px; margin: 0 auto; }
    .brand { font-size: 13px; letter-spacing: .16em; text-transform: uppercase; color: #8a8f9a; }
    h1 { font-size: 24px; margin: 4px 0 2px; }
    .date { color: #8a8f9a; margin-bottom: 22px; }
    ol { list-style: none; padding: 0; margin: 0 0 28px; counter-reset: n; }
    li { counter-increment: n; padding: 14px 0 14px 42px; position: relative; border-top: 1px solid #23262e; }
    li::before { content: counter(n); position: absolute; left: 0; top: 14px; width: 28px; height: 28px;
      border-radius: 50%; background: #1b1e25; color: #b7bcc6; font-size: 13px; display: grid; place-items: center; }
    .ttl { font-weight: 600; }
    .y { color: #8a8f9a; font-weight: 400; }
    .dir { color: #9aa0ab; font-size: 14px; }
    .tag { display: inline-block; margin-left: 8px; font-size: 11px; padding: 2px 8px; border-radius: 999px;
      background: #1f2a44; color: #9db4e6; vertical-align: middle; }
    .cta { display: inline-block; background: #f2f3f5; color: #0e0f13; text-decoration: none; font-weight: 600;
      padding: 12px 20px; border-radius: 10px; }
    .foot { margin-top: 34px; color: #6b7079; font-size: 12px; }
    .msg { text-align: center; color: #9aa0ab; padding: 60px 0; }
  </style>
</head>
<body>
  <main id="app"><div class="msg">Chargement…</div></main>
  <script>
    // API publique (Edge Function Supabase). Endpoint public, aucune donnée sensible.
    var API_BASE = "https://uftynwijspggwjhgnwqm.supabase.co/functions/v1";

    function el(tag, cls, text) {
      var n = document.createElement(tag);
      if (cls) n.className = cls;
      if (text != null) n.textContent = text; // rendu SÛR : jamais d'innerHTML
      return n;
    }
    function tokenFromUrl() {
      var q = new URLSearchParams(location.search).get("t");
      if (q) return q;
      var parts = location.pathname.split("/").filter(Boolean);
      return parts.length ? parts[parts.length - 1] : "";
    }
    function message(txt) {
      var app = document.getElementById("app");
      app.textContent = "";
      var m = el("div", "msg", txt);
      app.appendChild(m);
    }
    function render(data, token) {
      var app = document.getElementById("app");
      app.textContent = "";
      app.appendChild(el("div", "brand", "Kioskoscope"));
      app.appendChild(el("h1", null, "Votre séance"));
      if (data.date) app.appendChild(el("div", "date", data.date));
      var ol = el("ol");
      (data.films || []).forEach(function (f) {
        var li = el("li");
        var ttl = el("div", "ttl");
        ttl.appendChild(document.createTextNode(f.title || ""));
        if (f.year) { var y = el("span", "y", " (" + f.year + ")"); ttl.appendChild(y); }
        if (f.source === "recommendation") ttl.appendChild(el("span", "tag", "suggéré"));
        li.appendChild(ttl);
        if (f.director) li.appendChild(el("div", "dir", "de " + f.director));
        ol.appendChild(li);
      });
      app.appendChild(ol);
      var a = el("a", "cta", "Exporter vers Letterboxd (CSV)");
      a.href = API_BASE + "/s/" + encodeURIComponent(token) + ".csv";
      a.setAttribute("download", "kioskoscope-seance.csv");
      app.appendChild(a);
      app.appendChild(el("div", "foot",
        "Lien privé, non indexé. Aucune donnée personnelle n'est stockée sur cette page."));
    }

    (function () {
      var token = tokenFromUrl();
      if (!/^[A-Za-z0-9_-]{16,64}$/.test(token)) { message("Lien de séance invalide."); return; }
      fetch(API_BASE + "/s/" + encodeURIComponent(token) + "?format=json")
        .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function (data) {
          if (!data.films || !data.films.length) { message("Séance introuvable."); return; }
          render(data, token);
        })
        .catch(function () { message("Ce lien de séance n'existe pas ou a expiré."); });
    })();
  </script>
</body>
</html>
