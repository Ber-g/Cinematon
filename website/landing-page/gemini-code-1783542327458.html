<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kioskoscope</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,500;1,500&family=Open+Sans:wght@600&display=swap" rel="stylesheet">

  <style>
    /* =====================================================================
       TOKENS — pour éditer la landing, on ne touche (presque) qu'à ce bloc.
       ===================================================================== */
    :root {
      /* Fontes */
      --font-logo:  'Open Sans', sans-serif;          /* marque, sans-serif */
      --font-serif: 'Libre Bodoni', serif;            /* SEULE serif du site */

      /* Couleurs */
      --color-bg:          #ffffff;
      --color-ink:         #000000;
      --color-link:        #555555;
      --color-link-hover:  #000000;

      /* Arrière-plan (Chemin mis à jour vers le dossier assets) */
      --bg-svg:            url('../assets/Second lite.svg');

      /* Logo */
      --logo-size:         6rem;
      --logo-size-mobile:  8rem;
      --logo-stroke:       1.5px;

      /* Navigation */
      --nav-gap:           45px;
      --nav-gap-mobile:    35px;
      --nav-bottom:        40px;
      --nav-bottom-mobile: 30px;
    }

    /* =====================================================================
       STRUCTURE — logo centré, nav ancrée en bas, fond SVG + vignette.
       ===================================================================== */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--color-bg);

      /* DOUBLE ARRIÈRE-PLAN : 
         1. Un dégradé radial qui crée la vignette blanche en s'estompant vers les bords.
         2. Ton SVG de Montréal placé juste en dessous. */
      background-image: 
        radial-gradient(circle, rgba(255,255,255,0) 30%, var(--color-bg) 85%),
        var(--bg-svg);
      
      /* Paramètres d'affichage du SVG : centré, pas de déformation (ratio préservé) */
      background-position: center center;
      background-repeat: no-repeat;
      background-size: contain; 
      
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      overflow: hidden;
    }

    /* Contrepoids fantôme : compense la hauteur de la nav pour recentrer
       optiquement le logo sur l'axe vertical. */
    body::before {
      content: "";
      display: block;
      height: 60px;
    }

    /* =====================================================================
       LOGO — « Kioskoscope » effet fil (contour + relief).
       ===================================================================== */
    .logo-text {
      font-family: var(--font-logo);
      font-size: var(--logo-size);
      font-weight: 600;
      letter-spacing: 0.02em;
      display: flex; /* Aligne les lettres correctement pour éviter les sauts de ligne */
    }

    /* Rend les lettres indépendantes pour l'effet 3D individuel et l'animation */
    .letter {
      display: inline-block;
      white-space: pre; /* Préserve les espaces si nécessaire */
      
      /* Face avant OPAQUE transférée ici pour isoler chaque lettre */
      color: var(--color-bg);
      -webkit-text-stroke: var(--logo-stroke) var(--color-ink);

      /* Relief 3D rayé appliqué par lettre */
      text-shadow:
        -1px -1px 0 #ffffff, -2px -2px 0 var(--color-ink),
        -3px -3px 0 #ffffff, -4px -4px 0 var(--color-ink),
        -5px -5px 0 #ffffff, -6px -6px 0 var(--color-ink);
        
      /* Transition fluide pour le retour à la normale */
      transition: transform 0.3s ease; 
    }

    /* La classe qui sera activée par le JavaScript */
    .wave {
      animation: jumpWave 0.4s ease-in-out;
    }

    /* L'effet de la Hola : la lettre monte de 15px et redescend */
    @keyframes jumpWave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* =====================================================================
       NAVIGATION — liens serif (Libre Bodoni).
       ===================================================================== */
    .footer-nav {
      display: flex;
      gap: var(--nav-gap);
      margin-bottom: var(--nav-bottom);
      z-index: 10; /* S'assure que les boutons restent cliquables au-dessus du fond */
    }

    .btn-text {
      font-family: var(--font-serif);
      font-size: 0.95rem;
      font-weight: 500;
      text-transform: lowercase;
      color: var(--color-link);
      text-decoration: none;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .btn-text:hover,
    .btn-text:focus-visible {
      color: var(--color-link-hover);
      border-bottom-color: var(--color-link-hover);
      outline: none;
    }

    /* =====================================================================
       MOBILE — logo plus grand, « oscope » masqué (marque courte « Kiosk »).
       ===================================================================== */
    .mobile-hide { 
      display: inline-block; 
    }

    @media (max-width: 767px) {
      .mobile-hide { 
        display: none !important; 
      }
      .logo-text  { 
        font-size: var(--logo-size-mobile); 
      }
      .footer-nav {
        gap: var(--nav-gap-mobile);
        margin-bottom: var(--nav-bottom-mobile);
      }
      body::before { 
        height: 50px; 
      }
    }
  </style>
</head>
<body>

  <div class="logo-text" id="logo">
    <span class="letter">k</span>
    <span class="letter">i</span>
    <span class="letter">o</span>
    <span class="letter">s</span>
    <span class="letter">k</span>
    <span class="letter mobile-hide">o</span>
    <span class="letter mobile-hide">s</span>
    <span class="letter mobile-hide">c</span>
    <span class="letter mobile-hide">o</span>
    <span class="letter mobile-hide">p</span>
    <span class="letter mobile-hide">e</span>
  </div>

  <nav class="footer-nav">
    <a href="#connect" class="btn-text">connect</a>
    <a href="#contact" class="btn-text">contact</a>
  </nav>

  <script>
    function triggerHola() {
        const letters = document.querySelectorAll('.letter');
        
        // Filtre pour n'appliquer la vague qu'aux éléments réellement visibles (gère le mode mobile automatiquement)
        const visibleLetters = Array.from(letters).filter(letter => {
            return window.getComputedStyle(letter).display !== 'none';
        });

        // Déclenchement en cascade (60ms d'écart entre chaque lettre)
        visibleLetters.forEach((letter, index) => {
            setTimeout(() => {
                letter.classList.add('wave');
                
                // Nettoyage de la classe une fois le saut terminé
                setTimeout(() => {
                    letter.classList.remove('wave');
                }, 400); 

            }, index * 60); 
        });

        // Calcul du prochain intervalle aléatoire (entre 5 et 20 secondes)
        const nextInterval = Math.floor(Math.random() * (20000 - 5000 + 1)) + 5000;
        setTimeout(triggerHola, nextInterval);
    }

    // Premier déclenchement de l'animation 3 secondes après l'ouverture
    setTimeout(triggerHola, 3000);
  </script>
</body>
</html>
