<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kioskoscope</title>

  <!-- Fonts: sans (logo) + Libre Bodoni (seule serif du site). Une seule requête. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,500;1,500&family=Open+Sans:wght@600&display=swap" rel="stylesheet">

  <style>
    /* =====================================================================
       TOKENS — pour éditer la landing, on ne touche (presque) qu'à ce bloc.
       ===================================================================== */
    :root {
      /* Fontes */
      --font-logo:  'Open Sans', sans-serif;          /* marque, sans-serif */
      --font-serif: 'Libre Bodoni', serif;            /* SEULE serif du site */

      /* Couleurs */
      --color-bg:          #ffffff;
      --color-ink:         #000000;
      --color-link:        #555555;
      --color-link-hover:  #000000;

      /* Logo */
      --logo-size:         4.5rem;
      --logo-size-mobile:  8rem;
      --logo-stroke:       1.5px;

      /* Navigation */
      --nav-gap:           45px;
      --nav-gap-mobile:    35px;
      --nav-bottom:        40px;
      --nav-bottom-mobile: 30px;
    }

    /* =====================================================================
       STRUCTURE — logo centré, nav ancrée en bas.
       ===================================================================== */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--color-bg);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      overflow: hidden;
    }

    /* Contrepoids fantôme : compense la hauteur de la nav pour recentrer
       optiquement le logo sur l'axe vertical. */
    body::before {
      content: "";
      display: block;
      height: 60px;
    }

    /* =====================================================================
       LOGO — « Kioskoscope » effet fil (contour + relief).
       ===================================================================== */
    .logo-text {
      font-family: var(--font-logo);
      font-size: var(--logo-size);
      font-weight: 600;
      letter-spacing: 0.02em;

      /* Face avant OPAQUE (couleur du fond) : occulte les copies empilées
         derrière → les hachures ne traversent plus l'intérieur des lettres. */
      color: var(--color-bg);
      -webkit-text-stroke: var(--logo-stroke) var(--color-ink);

      /* Relief 3D rayé qui RECULE en z : copies décalées vers le haut-gauche
         (négatif), alternance blanc/noir = hachures. */
      text-shadow:
        -1px -1px 0 #ffffff, -2px -2px 0 var(--color-ink),
        -3px -3px 0 #ffffff, -4px -4px 0 var(--color-ink),
        -5px -5px 0 #ffffff, -6px -6px 0 var(--color-ink);
    }

    /* =====================================================================
       NAVIGATION — liens serif (Libre Bodoni).
       ===================================================================== */
    .footer-nav {
      display: flex;
      gap: var(--nav-gap);
      margin-bottom: var(--nav-bottom);
    }

    .btn-text {
      font-family: var(--font-serif);
      font-size: 0.95rem;
      font-weight: 500;
      text-transform: lowercase;
      color: var(--color-link);
      text-decoration: none;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .btn-text:hover,
    .btn-text:focus-visible {
      color: var(--color-link-hover);
      border-bottom-color: var(--color-link-hover);
      outline: none;
    }

    /* =====================================================================
       MOBILE — logo plus grand, « oscope » masqué (marque courte « Kiosk »).
       ===================================================================== */
    .mobile-hide { display: inline; }

    @media (max-width: 767px) {
      .mobile-hide { display: none; }
      .logo-text  { font-size: var(--logo-size-mobile); }
      .footer-nav {
        gap: var(--nav-gap-mobile);
        margin-bottom: var(--nav-bottom-mobile);
      }
      body::before { height: 50px; }
    }
  </style>
</head>
<body>

  <!-- Marque. Le « K » majuscule est volontaire ; le reste en minuscules. -->
  <div class="logo-text">Kiosk<span class="mobile-hide">oscope</span></div>

  <!-- Liens sans destination pour l'instant (placeholder assumé). -->
  <nav class="footer-nav">
    <a href="#connect" class="btn-text">connect</a>
    <a href="#contact" class="btn-text">contact</a>
  </nav>

</body>
</html>
